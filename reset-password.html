<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Isai Sangamam</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0203;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 24px;
        }

        .card {
            background: #180408;
            border: 1px solid #3a1010;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
        }

        .logo-tamil {
            font-family: 'Noto Sans Tamil', serif;
            font-size: 22px;
            font-weight: 700;
            color: #d4af37;
            text-align: center;
            margin-bottom: 2px;
        }

        .logo-en {
            font-size: 10px;
            color: #fff8e7;
            letter-spacing: 5px;
            text-align: center;
            opacity: 0.6;
            margin-bottom: 28px;
        }

        h2 {
            color: #d4af37;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        p {
            color: #b8963e;
            font-size: 12px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        label {
            display: block;
            font-size: 12px;
            color: #b8963e;
            margin-bottom: 6px;
            margin-top: 14px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            background: #0d0203;
            border: 1px solid #3a1010;
            border-radius: 10px;
            transition: border 0.2s;
        }

        .input-wrap:focus-within {
            border-color: #8b0000;
        }

        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 11px 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: #fff8e7;
        }

        .input-wrap input::placeholder {
            color: #4a2020;
        }

        .eye-btn {
            background: none;
            border: none;
            color: #6b3030;
            padding: 0 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: #2a0a0a;
            transition: background 0.3s;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: #8b0000;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff8e7;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #a01015;
        }

        .btn:disabled {
            background: #3a1010;
            cursor: not-allowed;
        }

        .msg {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }

        .msg.error {
            color: #e24b4a;
        }

        .msg.success {
            color: #1d9e75;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-tamil">இசை சங்கமம்</div>
        <div class="logo-en">ISAI SANGAMAM</div>
        <h2>Set New Password</h2>
        <p>Choose a strong new password for your account.</p>

        <label>New password</label>
        <div class="input-wrap">
            <input type="password" id="np" placeholder="Min. 8 characters" oninput="checkStr(this.value)" />
            <button class="eye-btn" onclick="togglePass('np', this)">👁</button>
        </div>
        <div class="strength">
            <div class="bar" id="b1"></div>
            <div class="bar" id="b2"></div>
            <div class="bar" id="b3"></div>
            <div class="bar" id="b4"></div>
        </div>

        <label>Confirm new password</label>
        <div class="input-wrap">
            <input type="password" id="cp" placeholder="Repeat password" />
            <button class="eye-btn" onclick="togglePass('cp', this)">👁</button>
        </div>

        <button class="btn" id="reset-btn" onclick="doReset()">Update Password</button>
        <div class="msg" id="reset-msg"></div>
    </div>

    <script>
        // Supabase automatically parses the token from URL hash
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('reset-btn').disabled = false;
            }
        });

        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁' : '🙈';
        }

        function checkStr(v) {
            let s = 0;
            if (v.length >= 8) s++;
            if (/[A-Z]/.test(v)) s++;
            if (/[0-9]/.test(v)) s++;
            if (/[^A-Za-z0-9]/.test(v)) s++;
            const c = { 1: '#e24b4a', 2: '#ef9f27', 3: '#1d9e75', 4: '#1d9e75' };
            for (let i = 1; i <= 4; i++) {
                document.getElementById('b' + i).style.background = i <= s ? c[s] : '#2a0a0a';
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('reset-msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        async function doReset() {
            const p1 = document.getElementById('np').value;
            const p2 = document.getElementById('cp').value;

            if (p1.length < 8) { showMsg('Min. 8 characters required', 'error'); return; }
            if (p1 !== p2) { showMsg('Passwords do not match', 'error'); return; }

            const { error } = await supabase.auth.updateUser({ password: p1 });

            if (error) {
                showMsg(error.message, 'error');
            } else {
                showMsg('✓ Password updated! Redirecting to login...', 'success');
                await supabase.auth.signOut();
                setTimeout(() => window.location.href = 'login.html', 2500);
            }
        }
    </script>
</body>

</html>
