<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isai Sangamam — Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d0203;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 24px 20px;
        }

        .card {
            background: #180408;
            border: 1px solid #3a1010;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
        }

        .logo-tamil {
            font-family: 'Noto Sans Tamil', serif;
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
            text-align: center;
            margin-bottom: 2px;
        }

        .logo-en {
            font-size: 10px;
            color: #fff8e7;
            letter-spacing: 5px;
            text-align: center;
            opacity: 0.6;
            margin-bottom: 28px;
        }

        .tabs {
            display: flex;
            background: #0d0203;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            border-radius: 7px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #b8963e;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #8b0000;
            color: #fff8e7;
        }

        .panel {
            display: none;
        }

        .panel.visible {
            display: block;
        }

        label {
            display: block;
            font-size: 12px;
            color: #b8963e;
            margin-bottom: 6px;
            margin-top: 14px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            background: #0d0203;
            border: 1px solid #3a1010;
            border-radius: 10px;
            transition: border 0.2s;
        }

        .input-wrap:focus-within {
            border-color: #8b0000;
        }

        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 11px 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: #fff8e7;
        }

        .input-wrap input::placeholder {
            color: #4a2020;
        }

        .eye-btn {
            background: none;
            border: none;
            color: #6b3030;
            padding: 0 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: #8b0000;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff8e7;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #a01015;
        }

        .btn:disabled {
            background: #3a1010;
            cursor: not-allowed;
        }

        .msg {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
            display: none;
        }

        .msg.error {
            color: #e24b4a;
            display: block;
        }

        .msg.success {
            color: #1d9e75;
            display: block;
        }

        .forgot {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #b8963e;
            cursor: pointer;
            margin-top: 8px;
            background: none;
            border: none;
            font-family: 'Poppins', sans-serif;
            padding: 0;
        }

        .forgot:hover {
            color: #d4af37;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #2a0a0a;
        }

        .divider-text {
            font-size: 11px;
            color: #6b3030;
        }

        .terms {
            font-size: 11px;
            color: #6b3030;
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }

        .terms a {
            color: #b8963e;
            text-decoration: none;
        }

        /* Forgot Password Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #180408;
            border: 1px solid #3a1010;
            border-radius: 18px;
            padding: 28px 24px;
            width: 90%;
            max-width: 340px;
        }

        .modal h3 {
            color: #d4af37;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .modal p {
            color: #b8963e;
            font-size: 12px;
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .modal-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-outline {
            flex: 1;
            padding: 11px;
            background: transparent;
            border: 1px solid #3a1010;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: #b8963e;
            cursor: pointer;
        }

        .btn-solid {
            flex: 1;
            padding: 11px;
            background: #8b0000;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #fff8e7;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo-tamil">இசை சங்கமம்</div>
        <div class="logo-en">ISAI SANGAMAM</div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="panel visible" id="login-panel">
            <label>Email address</label>
            <div class="input-wrap">
                <input type="email" id="l-email" placeholder="your@email.com" />
            </div>
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="l-pass" placeholder="Your password" />
                <button class="eye-btn" onclick="togglePass('l-pass', this)">👁</button>
            </div>
            <button class="forgot" onclick="openForgot()">Forgot password?</button>
            <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
            <div class="msg" id="login-msg"></div>
        </div>

        <!-- SIGNUP PANEL -->
        <div class="panel" id="signup-panel">
            <label>Full name</label>
            <div class="input-wrap">
                <input type="text" id="s-name" placeholder="Your full name" />
            </div>
            <label>Email address</label>
            <div class="input-wrap">
                <input type="email" id="s-email" placeholder="your@email.com" />
            </div>
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="s-pass" placeholder="Min. 8 characters" />
                <button class="eye-btn" onclick="togglePass('s-pass', this)">👁</button>
            </div>
            <label>Confirm password</label>
            <div class="input-wrap">
                <input type="password" id="s-pass2" placeholder="Repeat password" />
            </div>
            <button class="btn" id="signup-btn" onclick="doSignup()">Create Account</button>
            <div class="msg" id="signup-msg"></div>
            <div class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- FORGOT PASSWORD MODAL -->
    <div class="modal-overlay" id="forgot-modal">
        <div class="modal">
            <h3>Reset Password</h3>
            <p>Enter your email and we'll send you a reset link.</p>
            <div class="input-wrap">
                <input type="email" id="f-email" placeholder="your@email.com" />
            </div>
            <div class="msg" id="forgot-msg"></div>
            <div class="modal-btn-row">
                <button class="btn-outline" onclick="closeForgot()">Cancel</button>
                <button class="btn-solid" onclick="doForgot()">Send Link</button>
            </div>
        </div>
    </div>

    <script>
        // Redirect to index if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });

        function switchTab(tab) {
            document.getElementById('login-panel').classList.toggle('visible', tab === 'login');
            document.getElementById('signup-panel').classList.toggle('visible', tab === 'signup');
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
            });
        }

        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁' : '🙈';
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        // ── SIGN IN ──
        async function doLogin() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value;
            const btn = document.getElementById('login-btn');

            if (!email || !pass) { showMsg('login-msg', 'Please fill in all fields', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });

            if (error) {
                showMsg('login-msg', error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            } else {
                showMsg('login-msg', '✓ Welcome back! Loading your music...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        }

        // ── SIGN UP ──
        async function doSignup() {
            const name = document.getElementById('s-name').value.trim();
            const email = document.getElementById('s-email').value.trim();
            const pass = document.getElementById('s-pass').value;
            const pass2 = document.getElementById('s-pass2').value;
            const btn = document.getElementById('signup-btn');

            if (!name || !email || !pass) { showMsg('signup-msg', 'Please fill in all fields', 'error'); return; }
            if (pass.length < 8) { showMsg('signup-msg', 'Password must be at least 8 characters', 'error'); return; }
            if (pass !== pass2) { showMsg('signup-msg', 'Passwords do not match', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const { error } = await supabase.auth.signUp({
                email,
                password: pass,
                options: { data: { full_name: name } }
            });

            if (error) {
                showMsg('signup-msg', error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            } else {
                showMsg('signup-msg', '✓ Account created! Signing you in...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1800);
            }
        }

        // ── FORGOT PASSWORD ──
        function openForgot() { document.getElementById('forgot-modal').classList.add('open'); }
        function closeForgot() {
            document.getElementById('forgot-modal').classList.remove('open');
            document.getElementById('forgot-msg').className = 'msg';
            document.getElementById('f-email').value = '';
        }

        async function doForgot() {
            const email = document.getElementById('f-email').value.trim();
            if (!email) { showMsg('forgot-msg', 'Please enter your email', 'error'); return; }

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://your-project.vercel.app/reset-password.html'
            });

            if (error) {
                showMsg('forgot-msg', error.message, 'error');
            } else {
                showMsg('forgot-msg', '✓ Reset link sent! Check your inbox.', 'success');
                setTimeout(closeForgot, 3000);
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-panel').classList.contains('visible')) doLogin();
                else doSignup();
            }
        });
    </script>
</body>

</html>
